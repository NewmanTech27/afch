    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(P.s),iterations:250000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(P.i)},k,b(P.c));
    document.open();document.write(new TextDecoder().decode(pt));document.close();
  }catch(_){err.textContent='Clave incorrecta.';}
});
